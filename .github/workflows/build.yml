name: Build OpenWrt APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'README.md'
      - 'RELEASE_STATUS.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'RELEASE_STATUS.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openwrt-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          chmod +x build-on-ubuntu.sh
          ./build-on-ubuntu.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-huawei-hilink-status
          path: |
            result/*.apk
            result/SHA256SUMS
          if-no-files-found: error

      - name: Publish v1.0.0 release
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
          else
            RELEASE_TAG="v1.0.0"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" result/*.apk result/SHA256SUMS --clobber
          else
            gh release create "$RELEASE_TAG" \
              result/*.apk result/SHA256SUMS \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
