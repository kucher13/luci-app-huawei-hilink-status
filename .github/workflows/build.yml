name: Build OpenWrt APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: ./build-on-ubuntu.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-huawei-hilink-status
          path: |
            result/*.apk
            result/SHA256SUMS
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            result/*.apk result/SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
