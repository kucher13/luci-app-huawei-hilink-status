name: Build OpenWrt APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - 'PROJECT_STATUS.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'RELEASE_STATUS.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - 'PROJECT_STATUS.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - 'RELEASE_STATUS.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openwrt-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        shell: bash
        run: |
          required_files=(
            Makefile
            build-on-ubuntu.sh
            files/usr/bin/huawei
            files/www/luci-static/resources/view/huawei/lte_clean.js
            files/usr/share/luci/menu.d/luci-app-huawei-lte.json
            files/usr/share/rpcd/acl.d/luci-app-huawei-lte.json
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=${file}::Required file is missing"
              exit 1
            fi
          done

      - name: Check backend shell syntax
        run: sh -n files/usr/bin/huawei

      - name: Check build script syntax
        run: bash -n build-on-ubuntu.sh

      - name: Check frontend JavaScript syntax
        run: node --check files/www/luci-static/resources/view/huawei/lte_clean.js

      - name: Check JSON syntax
        run: |
          python3 -m json.tool files/usr/share/luci/menu.d/luci-app-huawei-lte.json >/dev/null
          python3 -m json.tool files/usr/share/rpcd/acl.d/luci-app-huawei-lte.json >/dev/null

  build:
    needs: validation
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          chmod +x build-on-ubuntu.sh
          ./build-on-ubuntu.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-huawei-hilink-status
          path: |
            result/*.apk
            result/SHA256SUMS
          if-no-files-found: error

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: luci-app-huawei-hilink-status
          path: result

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_VERSION="$(awk -F':=' '$1 == "PKG_VERSION" { print $2; exit }' Makefile)"
          if [[ -z "$PKG_VERSION" ]]; then
            echo "::error::Could not read PKG_VERSION from Makefile"
            exit 1
          fi

          RELEASE_TAG="$GITHUB_REF_NAME"
          EXPECTED_TAG="v${PKG_VERSION}"

          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match Makefile PKG_VERSION ${PKG_VERSION}; expected ${EXPECTED_TAG}"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release ${RELEASE_TAG} already exists; refusing to modify it"
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            result/*.apk result/SHA256SUMS \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
